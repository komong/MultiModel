model_list:
  # OpenAI
  - model_name: gpt-4o
    litellm_params:
      model: openai/gpt-4o
      api_key: os.environ/OPENAI_API_KEY

  - model_name: gpt-4o-mini
    litellm_params:
      model: openai/gpt-4o-mini
      api_key: os.environ/OPENAI_API_KEY

  # Anthropic
  - model_name: claude-sonnet
    litellm_params:
      model: anthropic/claude-sonnet-4-20250514
      api_key: os.environ/ANTHROPIC_API_KEY

  # 本地 Ollama（可选）
  # - model_name: llama3
  #   litellm_params:
  #     model: ollama/llama3
  #     api_base: http://localhost:11434

litellm_settings:
  num_retries: 3
  request_timeout: 60
  # 后面接 Langfuse 时在这里加 success_callback

general_settings:
  master_key: sk-my-master-key-1234
